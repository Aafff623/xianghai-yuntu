<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 · 乡旅e模式</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/shell.css" />
</head>
<body class="page-auth">
  <div id="flash" class="flash" role="status"></div>
  <header class="app-nav">
    <a class="app-nav__brand" href="index.html">
      <img src="../../assets/brand/logo.svg" alt="乡旅e模式" />
      <span>乡旅e模式</span>
    </a>
    <div class="app-nav__actions" id="authSlot"></div>
  </header>

  <div class="auth-page">
    <section class="auth-copy">
      <a class="back-link" href="index.html">← 返回首页</a>
      <p class="eyebrow">Create Account</p>
      <h1>开启旅程</h1>
      <p class="muted" style="font-size:17px;color:var(--muted)">注册账号，保存你的偏好与收藏</p>
      <form class="auth-form" id="registerForm">
        <h2>注册新账号</h2>
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" required placeholder="请输入用户名" autocomplete="username" style="height:50px;border:1px solid #d8e2e7;border-radius:12px;padding:0 14px;width:100%" />
        </div>
        <div class="field" style="margin-top:14px">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" required placeholder="请输入密码" autocomplete="new-password" style="height:50px;border:1px solid #d8e2e7;border-radius:12px;padding:0 14px;width:100%" />
        </div>
        <div class="field" style="margin-top:14px">
          <label for="password2">确认密码</label>
          <input id="password2" name="password2" type="password" required placeholder="请再次输入密码" autocomplete="new-password" style="height:50px;border:1px solid #d8e2e7;border-radius:12px;padding:0 14px;width:100%" />
        </div>
        <button class="btn" type="submit" style="width:100%;margin-top:18px">注册</button>
        <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted)">
          已有账号？ <a href="login.html" style="color:#0b6b96;font-weight:600">立即登录</a>
        </p>
      </form>
    </section>
    <aside class="auth-visual register-bg" aria-hidden="true">
      <div class="auth-benefits">
        <div class="benefit"><strong>全国场景</strong><span>多区域类型模板</span></div>
        <div class="benefit"><strong>三维筛选</strong><span>天数 · 主题 · 风格</span></div>
        <div class="benefit"><strong>行程文档</strong><span>饮食 · 住宿 · 费用</span></div>
      </div>
    </aside>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData(e.currentTarget);
      if (fd.get("password") !== fd.get("password2")) {
        XLYUI.showFlash("danger", "两次输入的密码不一致");
        return;
      }
      const res = XLYAuth.register(fd.get("username"), fd.get("password"));
      if (!res.ok) {
        XLYUI.showFlash("danger", res.msg);
        return;
      }
      sessionStorage.setItem("xly_flash", JSON.stringify({ type: "success", text: res.msg }));
      location.href = "login.html";
    });
  </script>
</body>
</html>
