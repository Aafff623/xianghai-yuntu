<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>路线详情 · 乡旅e模式</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="flash" class="flash" role="status"></div>
  <header class="app-nav">
    <a class="app-nav__brand" href="index.html">
      <img src="../../assets/landing/logo.jpg" alt="" width="30" height="30" />
      <span>乡旅e模式</span>
    </a>
    <form class="app-nav__search" id="headerSearch">
      <input type="search" name="q" placeholder="搜索全国路线关键词…" />
      <button class="btn btn--sm" type="submit">搜索</button>
    </form>
    <div class="app-nav__actions" id="authSlot"></div>
  </header>

  <main id="main">
    <a class="back-link" href="smart-search.html">← 返回推荐</a>
    <div id="content"></div>
  </main>

  <footer class="app-footer">中北大学软件学院 · 乡旅e模式</footer>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get("id");
    const r = XLYData.byId(id);
    const box = document.getElementById("content");
    if (!r) {
      box.innerHTML = `<div class="empty"><p>未找到该路线</p><a href="index.html">回首页</a></div>`;
    } else {
      document.title = r.keyword + " · 乡旅e模式";
      const related = XLYData.related(r, 3);
      box.innerHTML = `
        <header class="detail-head">
          <h1>${r.keyword}</h1>
          <div class="tags">
            <span>${r.days}天行程</span>
            <span>${r.route_type}</span>
            <span>${r.budget_level}</span>
            <span>${r.region}</span>
          </div>
          <p class="detail-summary">${r.route_details}</p>
        </header>
        <div class="detail-grid">
          <section class="panel">
            <h2 class="section-label" style="margin-top:0">详细行程安排</h2>
            <ol class="timeline">
              ${r.daily_schedule
                .map(
                  (s) => `<li>
                  <time>第${s.day}天 ${s.time}</time>
                  <div><strong>${s.title}</strong><p>${s.desc}</p></div>
                </li>`
                )
                .join("")}
            </ol>
          </section>
          <aside class="info-cards">
            <div class="info-card"><h3>饮食推荐</h3><p>${r.dining}</p></div>
            <div class="info-card"><h3>住宿建议</h3><p>${r.accommodation}</p></div>
            <div class="info-card"><h3>费用估算</h3><p>${r.cost_estimation}</p></div>
          </aside>
        </div>
        ${
          related.length
            ? `<h2 class="section-label">其他 ${r.day_range} 天路线推荐</h2>
          <div class="related">
            ${related
              .map(
                (x) =>
                  `<a href="route-detail.html?id=${encodeURIComponent(x.id)}">${x.keyword}<br><span class="meta" style="font-weight:500;color:var(--ink-faint)">${x.region}</span></a>`
              )
              .join("")}
          </div>`
            : ""
        }`;
    }
  </script>
</body>
</html>
