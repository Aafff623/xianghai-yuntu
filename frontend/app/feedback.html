<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>意见反馈 · 乡旅e模式</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/shell.css" />
</head>
<body class="page-feedback">
  <div id="flash" class="flash" role="status"></div>
  <header class="app-nav">
    <a class="app-nav__brand" href="index.html">
      <img src="../../assets/brand/logo.svg" alt="乡旅e模式" />
      <span>乡旅e模式</span>
    </a>
    <form class="app-nav__search" id="headerSearch">
      <input type="search" name="q" placeholder="搜索目的地 / 玩法 / 攻略" />
      <button class="btn btn--sm" type="submit">搜索</button>
    </form>
    <div class="app-nav__actions" id="authSlot"></div>
  </header>

  <div class="feedback-layout">
    <section class="feedback-main">
      <a class="back-link" href="index.html">← 返回首页</a>
      <p class="eyebrow">Voice of Traveler</p>
      <h1>意见反馈</h1>
      <p style="color:var(--muted);max-width:36ch">告诉我们你的体验与建议，帮助乡旅e模式变得更好。</p>
      <form class="feedback-card" id="feedbackForm">
        <label for="content" style="display:block;font-weight:600;margin-bottom:10px;font-size:14px">你的意见或建议</label>
        <textarea id="content" name="content" required placeholder="请描述你的想法、遇到的问题，或希望增加的功能…" maxlength="800"></textarea>
        <button class="btn" type="submit" style="width:100%;margin-top:14px">提交反馈</button>
        <p style="margin:14px 0 0;font-size:13px;color:var(--muted)">演示环境将反馈保存在本地浏览器，不会上传服务器。</p>
      </form>
    </section>
    <aside class="feedback-image" aria-hidden="true"></aside>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("feedbackForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const content = new FormData(e.currentTarget).get("content");
      const list = JSON.parse(localStorage.getItem("xly_feedback_v1") || "[]");
      list.push({
        content: String(content),
        user: XLYAuth.current()?.username || null,
        at: new Date().toISOString(),
      });
      localStorage.setItem("xly_feedback_v1", JSON.stringify(list));
      sessionStorage.setItem(
        "xly_flash",
        JSON.stringify({ type: "success", text: "反馈已提交！" })
      );
      location.href = "index.html";
    });
  </script>
</body>
</html>
