<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>搜索结果 · 乡旅e模式</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="page-results">
  <div id="flash" class="flash" role="status"></div>
  <header class="app-nav">
    <a class="app-nav__brand" href="index.html">
      <img src="../../assets/landing/logo.jpg" alt="" width="30" height="30" />
      <span>乡旅e模式</span>
    </a>
    <form class="app-nav__search" id="headerSearch">
      <input type="search" name="q" id="qInput" placeholder="搜索全国路线关键词…" />
      <button class="btn btn--sm" type="submit">搜索</button>
    </form>
    <div class="app-nav__actions" id="authSlot"></div>
  </header>

  <main>
    <a class="back-link" href="index.html">← 返回首页</a>
    <h1 class="page-title">搜索结果</h1>
    <p class="page-sub" id="hint">仅匹配路线，不包含用户</p>
    <div id="results" class="route-list"></div>
  </main>

  <footer class="app-footer">中北大学软件学院 · 乡旅e模式</footer>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    const q = new URLSearchParams(location.search).get("q") || "";
    document.getElementById("qInput").value = q;
    document.getElementById("hint").textContent = q
      ? `关键词「${q}」· 全国区域类型路线`
      : "请输入关键词，如：水乡、梯田、徽州、亲子、西北";

    const list = XLYData.keywordSearch(q);
    const box = document.getElementById("results");
    if (!q) {
      box.innerHTML = `<div class="empty"><p>请输入搜索关键词</p></div>`;
    } else if (!list.length) {
      box.innerHTML = `<div class="empty"><p>未找到匹配结果</p></div>`;
    } else {
      box.innerHTML = list
        .map((r, i) => {
          const score = XLYData.rankScore(r).toFixed(1);
          return `<article class="route-card">
          <div class="route-card__media">
            <img src="${r.image}" alt="" />
            <span class="route-card__rank">TOP ${i + 1}</span>
          </div>
          <div class="route-card__body">
            <div class="tags"><span>${r.days}天</span><span>${r.route_type}</span><span>${r.budget_level}</span><span>${r.region_tag || ""}</span></div>
            <h3>${r.keyword}</h3>
            <p class="meta">${r.region}</p>
            <div class="stats-row">
              <span>热度 <strong>${r.popularity}</strong></span>
              <span>评分 <strong>${r.rating}</strong></span>
              <span>点赞 <strong>${r.likes}</strong></span>
              <span>综合 <strong>${score}</strong></span>
            </div>
            <p>${r.route_details}</p>
            <a class="btn btn--ghost btn--sm" href="route-detail.html?id=${encodeURIComponent(r.id)}">查看详细行程</a>
          </div>
        </article>`;
        })
        .join("");
    }
  </script>
</body>
</html>
