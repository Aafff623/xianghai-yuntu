  <text x="420" y="420" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="12" fill="#c47845">Wave 2：文心一言 API</text>
</g>
<path d="M682 290 H732" stroke="#0a6eae" stroke-width="2.5" fill="none" marker-end="url(#m)"/>
