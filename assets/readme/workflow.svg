  <text x="54" y="220" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="11" fill="#5e7482">主题场景 / 演示</text>
</g>
<path d="M174 195 H196" stroke="#0a6eae" stroke-width="2" fill="none" marker-end="url(#a)"/>
