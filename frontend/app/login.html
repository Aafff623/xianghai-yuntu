<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 乡旅e模式</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="flash" class="flash" role="status"></div>
  <header class="app-nav">
    <a class="app-nav__brand" href="index.html">
      <img src="../../assets/landing/logo.jpg" alt="" width="30" height="30" />
      <span>乡旅e模式</span>
    </a>
    <div class="app-nav__actions" id="authSlot"></div>
  </header>

  <main>
    <a class="back-link" href="index.html">← 返回首页</a>
    <div class="auth-wrap panel">
      <h1>用户登录</h1>
      <form id="loginForm">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" required placeholder="请输入用户名" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" required placeholder="请输入密码" autocomplete="current-password" />
        </div>
        <button class="btn btn--block" type="submit">登录</button>
      </form>
      <p class="auth-foot">没有账号？<a href="register.html">立即注册</a></p>
    </div>
  </main>

  <footer class="app-footer">中北大学软件学院 · 乡旅e模式</footer>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const fd = new FormData(e.currentTarget);
      const res = XLYAuth.login(fd.get("username"), fd.get("password"));
      if (!res.ok) {
        XLYUI.showFlash("danger", res.msg);
        return;
      }
      sessionStorage.setItem("xly_flash", JSON.stringify({ type: "success", text: res.msg }));
      const next = new URLSearchParams(location.search).get("next") || "index.html";
      location.href = next;
    });
  </script>
</body>
</html>
