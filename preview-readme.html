<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>乡海云途 — README Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-light.min.css" />
  <link rel="stylesheet" href="preview-readme.css" />
</head>
<body>
  <div class="toolbar">
    <h1 id="toolbar-title">乡海云途 · README Preview</h1>
    <span id="toolbar-hint" class="hint">本地预览 <code>README.md</code>，改完刷新即可，无需频繁 commit</span>
    <button type="button" id="reload-btn">重新加载 README</button>
    <a id="open-readme-link" href="./README.md" target="_blank" rel="noopener">打开 README.md</a>
    <a href="https://github.com/Aafff623/xianghai-yuntu" target="_blank" rel="noopener">GitHub 仓库</a>
  </div>
  <div id="status" class="status">正在加载 README…</div>
  <div class="page">
    <article id="content" class="markdown-body"></article>
    <p id="footer-note" class="footer-note"></p>
  </div>

  <script>
    window.__PREVIEW_README__ = {
      readmeFile: 'README.md',
      pageLang: 'zh-CN',
      title: '乡海云途 — README Preview',
      toolbarTitle: '乡海云途 · README Preview',
      hint: '本地预览 <code>README.md</code>，改完点「重新加载」即可，无需频繁 commit',
      reloadLabel: '重新加载 README',
      openLabel: '打开 README.md',
      loading: '正在加载 README…',
      loadedPrefix: '已加载',
      fileProtocolError:
        '请用本地 HTTP 服务打开（file:// 无法 fetch README）。在仓库根目录执行：python -m http.server 8080，然后访问 http://localhost:8080/preview-readme.html',
      fetchError: '加载失败：',
      footerNote:
        '预览页：preview-readme.html · 配图：assets/readme/ · GitHub 裂图请先 push 对应文件或等 Grok 出图完成。',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="preview-readme.js"></script>
</body>
</html>
