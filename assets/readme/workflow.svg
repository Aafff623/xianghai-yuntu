  <rect x="200" y="120" width="130" height="8" rx="4" fill="url(#sea)"/>
  <text x="214" y="162" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0a6eae">02 注册登录</text>
  <text x="214" y="192" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0a3553">admin / 123456</text>
  <text x="214" y="220" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="11" fill="#5e7482">演示账号可用</text>
</g>
<path d="M334 195 H356" stroke="#0a6eae" stroke-width="2" fill="none" marker-end="url(#a)"/>
