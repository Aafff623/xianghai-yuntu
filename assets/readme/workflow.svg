  <text x="694" y="162" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#0a6eae">05 路线详情</text>
  <text x="694" y="192" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0a3553">Markdown 行程</text>
  <text x="694" y="220" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="11" fill="#5e7482">餐饮住宿费用</text>
