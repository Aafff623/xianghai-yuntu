  <text x="854" y="192" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#0a3553">意见提交</text>
  <text x="854" y="220" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="11" fill="#5e7482">本地演示提示</text>
