<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>路线详情 · 乡旅e模式</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="page-detail">
  <div id="flash" class="flash" role="status"></div>
  <header class="app-nav">
    <a class="app-nav__brand" href="index.html">
      <img src="../../assets/landing/logo.jpg" alt="" width="32" height="32" />
      <span>乡旅e模式</span>
    </a>
    <form class="app-nav__search" id="headerSearch">
      <input type="search" name="q" placeholder="搜索全国路线关键词…" />
      <button class="btn btn--sm" type="submit">搜索</button>
    </form>
    <div class="app-nav__actions" id="authSlot"></div>
  </header>

  <main>
    <a class="back-link" href="javascript:history.back()">← 返回上一页</a>
    <div id="content"></div>
  </main>

  <footer class="app-footer">中北大学软件学院 · 乡旅e模式</footer>
  <script src="js/data.js"></script>
  <script src="js/md.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get("id");
    const r = XLYData.byId(id);
    const box = document.getElementById("content");

    if (!r) {
      box.innerHTML = `<div class="empty"><p>未找到该路线</p><a class="btn btn--ghost" href="index.html" style="margin-top:1rem">回首页</a></div>`;
    } else {
      document.title = r.keyword + " · 乡旅e模式";
      const related = XLYData.related(r, 3);

      const toc = [
        { id: "sec-ai", label: "摘要" },
        { id: "sec-overview", label: "路线概述" },
        { id: "sec-schedule", label: "行程安排" },
        { id: "sec-dining", label: "饮食推荐" },
        { id: "sec-stay", label: "住宿建议" },
        { id: "sec-cost", label: "费用估算" },
        { id: "sec-related", label: "相关推荐" },
      ];

      const tocHTML = toc
        .map(
          (t, i) =>
            `<a href="#${t.id}" data-toc="${t.id}"><span class="toc-num">${String(i + 1).padStart(2, "0")}</span><span class="toc-label">${t.label}</span></a>`
        )
        .join("");

      box.innerHTML = `
        <div class="toc-mobile" id="tocMobile">${tocHTML}</div>
        <div class="detail-layout">
          <article class="detail-shell">
            <div class="detail-paper">
              <header class="detail-hero">
                <img src="${r.image}" alt="" />
                <div class="detail-hero__meta">
                  ${XLYIcons.tagsHTML(r)}
                  <h1>${r.keyword}</h1>
                  <p class="meta-line">${r.region}</p>
                  ${XLYIcons.statsHTML(r)}
                </div>
              </header>

              <aside class="ai-summary" id="sec-ai" aria-label="摘要">
                <div class="ai-summary__head">
                  <span class="ai-summary__badge">摘要</span>
                </div>
                <p>${r.ai_summary || r.route_details}</p>
              </aside>

              <section class="doc-section doc-prose" id="sec-overview">
                ${XLYMd.render(r.body_md || `## 路线概述\n\n${r.route_details}`)}
              </section>

              <section class="doc-section" id="sec-schedule">
                <h2 class="section-label doc-h">行程安排</h2>
                <ol class="timeline">
                  ${r.daily_schedule
                    .map(
                      (s) => `<li>
                      <time>D${s.day} · ${s.time}</time>
                      <div><strong>${s.title}</strong><p>${s.desc}</p></div>
                    </li>`
                    )
                    .join("")}
                </ol>
              </section>

              <section class="doc-section doc-prose" id="sec-dining">
                ${XLYMd.render(r.dining_md || `## 饮食推荐\n\n${r.dining || ""}`)}
              </section>

              <section class="doc-section doc-prose" id="sec-stay">
                ${XLYMd.render(r.stay_md || `## 住宿建议\n\n${r.accommodation || ""}`)}
              </section>

              <section class="doc-section doc-prose" id="sec-cost">
                ${XLYMd.render(r.cost_md || `## 费用估算\n\n${r.cost_estimation || ""}`)}
              </section>

              ${
                related.length
                  ? `<section class="doc-section" id="sec-related">
                <h2 class="section-label doc-h">相关推荐</h2>
                <div class="related related--cards">
                  ${related
                    .map(
                      (x) =>
                        `<a class="related-card" href="route-detail.html?id=${encodeURIComponent(x.id)}">
                          <span class="related-card__media"><img src="${x.image}" alt="" loading="lazy" /></span>
                          <span class="related-card__body">
                            <strong>${x.keyword}</strong>
                            <em>${x.region_tag || ""} · ${x.rating} 分</em>
                            <em class="related-card__tags">${(x.hot_tags || []).slice(0, 3).join(" · ")}</em>
                          </span>
                        </a>`
                    )
                    .join("")}
                </div>
              </section>`
                  : ""
              }
            </div>
          </article>

          <aside class="detail-toc" aria-label="文章目录">
            <p class="detail-toc__title">本页</p>
            <nav id="tocNav">${tocHTML}</nav>
          </aside>
        </div>`;

      // TOC active state on scroll
      const links = [...document.querySelectorAll("[data-toc]")];
      const ids = toc.map((t) => t.id);
      const setActive = (id) => {
        links.forEach((a) => a.classList.toggle("is-active", a.getAttribute("data-toc") === id));
      };
      const obs = new IntersectionObserver(
        (entries) => {
          entries.forEach((en) => {
            if (en.isIntersecting) setActive(en.target.id);
          });
        },
        { rootMargin: "-20% 0px -65% 0px", threshold: 0.01 }
      );
      ids.forEach((sid) => {
        const el = document.getElementById(sid);
        if (el) obs.observe(el);
      });
      setActive("sec-ai");
    }
  </script>
</body>
</html>
